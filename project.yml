name: iMoodRing
options:
  bundleIdPrefix: com.nharsh
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

targets:
  iMoodRing:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: iMoodRing
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nharsh.iMoodRing
        SWIFT_VERSION: 5.9
        INFOPLIST_FILE: iMoodRing/Resources/Info.plist
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: "iPhone Developer"
        CODE_SIGNING_REQUIRED: YES
        ENABLE_PREVIEWS: YES
    info:
      path: iMoodRing/Resources/Info.plist
