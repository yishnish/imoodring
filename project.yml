name: iMoodRing
options:
  bundleIdPrefix: com.nharsh
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

packages:
  LlamaSwift:
    url: https://github.com/mattt/llama.swift
    branch: main

targets:
  iMoodRing:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    dependencies:
      - package: LlamaSwift
        product: llama
    sources:
      - path: iMoodRing
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nharsh.iMoodRing
        SWIFT_VERSION: 5.9
        GENERATE_INFOPLIST_FILE: NO
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: "iPhone Developer"
        CODE_SIGNING_REQUIRED: YES
        ENABLE_PREVIEWS: YES
    info:
      path: iMoodRing/Resources/Info.plist
      properties:
        NSMicrophoneUsageDescription: MoodRing listens to nearby conversation to detect emotional tone.
        NSSpeechRecognitionUsageDescription: MoodRing transcribes speech on-device to analyze emotional tone.
        UIStatusBarHidden: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleDisplayName: MoodRing
